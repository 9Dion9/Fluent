name = "fluent-worker"
main = "../worker/src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Fill in after `wrangler d1 create fluent-db` (see docs/RUNBOOK.md).
[[d1_databases]]
binding = "DB"
database_name = "fluent-db"
database_id = "a51eea4d-cdf5-4795-a95c-bf7ea90be90f"
migrations_dir = "migrations"

# Fill in after `wrangler kv namespace create fluent-kv`.
[[kv_namespaces]]
binding = "KV"
id = "9d59d484186445a3b90063516c8d3629"

# Fill in after `wrangler r2 bucket create fluent-audio`.
[[r2_buckets]]
binding = "AUDIO"
bucket_name = "fluent-audio"

# Secrets (never in this file — set via `wrangler secret put <NAME> --config infra/wrangler.toml`):
#   GATEWAY_SHARED_SECRET   Worker -> gateway auth (X-Gateway-Secret)
#   TOKEN_SIGNING_KEY       HMAC key for bearer tokens
#   GATEWAY_URL             Cloudflare Tunnel hostname for the home-GPU inference gateway (M1).
#     A secret rather than a [vars] entry because it changes on every quick-tunnel
#     restart and Cloudflare doesn't allow a secret and a var to share a binding
#     name. Local dev overrides it via infra/.dev.vars (see docs/RUNBOOK.md); the
#     test suite gets a deterministic unroutable placeholder from
#     worker/vitest.config.ts's miniflare.bindings instead of this file.
